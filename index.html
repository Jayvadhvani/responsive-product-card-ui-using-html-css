  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
    
    body {
      background: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      transition: transform 0.3s ease;
    }

    .card:hover { transform: translateY(-10px); }

    .image-container {
      width: 100%;
      height: 250px;
      background: #f8fafc;
      padding: 20px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .image-container img {
      width: 80%;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 20px 20px rgba(0,0,0,0.15));
      transition: transform 0.5s ease;
    }
    
    .card:hover .image-container img { transform: scale(1.1) rotate(-5deg); }

    .badge {
      position: absolute;
      top: 15px; left: 15px;
      background: #ef4444; color: white;
      padding: 5px 12px; border-radius: 20px;
      font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
    }

    .content { padding: 25px; }

    .brand { color: #94a3b8; font-size: 0.9rem; font-weight: 500; text-transform: uppercase; margin-bottom: 5px; }
    
    .title { color: #1e293b; font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; }

    .price-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    
    .price { color: #0f172a; font-size: 1.8rem; font-weight: 700; }
    .old-price { color: #94a3b8; text-decoration: line-through; font-size: 1.1rem; }

    .options { margin-bottom: 25px; }
    .options-title { font-size: 0.9rem; color: #64748b; margin-bottom: 8px; font-weight: 500; }
    
    .colors { display: flex; gap: 10px; }
    .color-btn {
      width: 30px; height: 30px; border-radius: 50%;
      border: 3px solid white; box-shadow: 0 0 0 1px #cbd5e1;
      cursor: pointer; transition: all 0.2s;
    }
    .color-btn.active { box-shadow: 0 0 0 2px #0f172a; }
    
    .btn-cart {
      width: 100%; padding: 15px;
      background: #0f172a; color: white;
      border: none; border-radius: 12px;
      font-size: 1.1rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-cart:hover { background: #334155; }
  </style>
